syntax = "proto3";

package serverInteraction;

import "google/api/annotations.proto"; // For RESTful API support

// ==============================Cloud server==============================
// [consumer]获取数据胶囊
message GetDataCapsuleRequest
{
    string dc_id = 1; // 数据胶囊ID
}

message GetDataCapsuleResponse
{
    string data_capsule = 1; // JSON格式的数据胶囊
}

// [consumer]获取Ek(password)
message GetEncryptedDataCapsulePasswordRequest
{
    string dc_id = 1; // 数据胶囊ID
}

message GetEncryptedDataCapsulePasswordResponse
{
    string encrypted_dc_password = 1; // Ek(password)
}

// [consumer]获取数据胶囊访问策略
message GetProgramPolicyRequest
{
    string dc_id = 1; // 数据胶囊ID
}

message GetProgramPolicyResponse
{
    string program_policy = 1; // 访问策略
}

// [consumer]请求解密附加信息
message GetDataCapsuleKeyAdditionalInformationRequest
{
    string dc_id = 1; // 数据胶囊ID
}

message GetDataCapsuleKeyAdditionalInformationResponse
{
    string additional_information = 1; // 附加信息
}

// [producer]存储数据胶囊
message StoreDataCapsuleRequest
{
    string dc_id = 1;        // 数据胶囊ID
    string data_capsule = 2; // JSON格式的数据胶囊
}

message StoreDataCapsuleResponse
{
    bool success = 1; // 存储是否成功
}

// [front-end]获取现存所有胶囊详细信息
message GetExistingDataCapsuleInformationRequest
{
    string message = 1;
}

message GetExistingDataCapsuleInformationResponse
{
    string data_capsules = 1;
}

// [front-end]获取现存所有胶囊详细信息
message GetExistingDataCapsuleNumberRequest
{
    string message = 1;
}

message GetExistingDataCapsuleNumberResponse
{
    int32 data_capsules_number = 1; // 胶囊数量
}

// ==============================CertificateAuthority server==============================
// [consumer]TEE公钥提交与TEEID分配
message InitializeTEERequest
{
    bytes public_key = 1; // 发送的公钥
}

message InitializeTEEResponse
{
    string tee_id = 1;      // TEE唯一标识符
    bytes sign_certificate = 2;  // 数字证书
}

